baseurl = "https://damu.netlify.com/"
languageCode = "en-us"
title = "Damu's Corner"
theme = "hugo-lithium-theme"
googleAnalytics = ""
disqusShortname = ""
ignoreFiles = ["\\.Rmd$", "\\.Rmarkdown$", "_files$", "_cache$"]

[permalinks]
    post = "/:year/:month/:day/:slug/"

[[menu.main]]
    name = "About"
    url = "/about/"
[[menu.main]]
    name = "Blogs"
    url = "/blogs/"
[[menu.main]]
    name = "GitHub"
    url = "https://github.com/dtrik"

[params]
    description = "A blog built through Hugo and blogdown"

    # options for highlight.js (version, additional languages, and theme)
    highlightjsVersion = "9.11.0"
    highlightjsCDN = "//cdn.bootcss.com"
    highlightjsLang = ["r", "yaml"]
    highlightjsTheme = "github"

    MathJaxCDN = "//cdn.bootcss.com"
    MathJaxVersion = "2.7.1"

    [params.logo]
    url = "suarez.png"
    width = 150
    height = 150
    alt = "Logo"

